name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  phpcs:
    name: PHP lint + WPCS
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php: ['7.4', '8.2']
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: composer
      - name: PHP syntax check
        run: |
          find . -path ./node_modules -prune -o -name '*.php' -print0 | xargs -0 -n1 php -l
      - name: Install composer deps
        if: matrix.php == '8.2'
        run: composer install --no-interaction
      - name: PHPCS (WordPress ruleset)
        if: matrix.php == '8.2'
        run: composer lint

  js:
    name: JS build + lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint:js
      - run: npm run build
